<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EJ's FNAF STASH</title>
    <style>
        :root {
            --bg-color: #0b0b0c;
            --card-bg: #141416;
            --accent-red: #ff2a2a;
            --accent-teal: #00f2fe;
            --text-main: #ffffff;
            --text-muted: #8a8a93;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: var(--accent-red);
            font-size: 3.5rem;
            font-weight: 900;
            letter-spacing: 2px;
            text-shadow: 0 0 20px rgba(255, 42, 42, 0.4);
            margin-bottom: 40px;
            text-align: center;
            text-transform: uppercase;
        }

        h2 {
            border-bottom: 1px solid #242427;
            padding-bottom: 15px;
            width: 100%;
            max-width: 1100px;
            color: #f7b500;
            margin-top: 50px;
            font-size: 1.8rem;
            letter-spacing: 1px;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1100px;
            margin-top: 20px;
        }

        .slot-link {
            text-decoration: none;
            color: inherit;
            outline: none;
        }

        .slot {
            background-color: var(--card-bg);
            border: 1px solid #242427;
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
            height: 100%;
        }

        .slot:hover {
            transform: translateY(-8px);
            border-color: var(--accent-red);
            box-shadow: 0 12px 24px rgba(255, 42, 42, 0.25);
        }

        .icon-container {
            width: 100%;
            padding-top: 100%; 
            position: relative;
            background-color: #0d0d0f;
        }

        .game-icon {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .slot:hover .game-icon {
            transform: scale(1.08);
        }

        .icon-fallback {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            background: linear-gradient(135deg, #1f1f23 0%, #101012 100%);
            color: #3f3f46;
        }

        .slot-title {
            padding: 15px;
            font-size: 1.1rem;
            font-weight: 700;
            text-align: center;
            background-color: var(--card-bg);
            border-top: 1px solid #242427;
            letter-spacing: 0.5px;
        }

        .example-grid .slot {
            cursor: pointer;
        }
        .example-grid .slot:hover {
            border-color: var(--accent-teal);
            box-shadow: 0 12px 24px rgba(0, 242, 254, 0.25);
        }

        .iframe-container {
            width: 100%;
            max-width: 1100px;
            margin-top: 35px;
            display: none;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            border: 1px solid #242427;
        }

        iframe.main-display {
            width: 100%;
            height: 650px;
            border: none;
            background-color: #000;
            display: block;
        }

        .status-msg {
            color: var(--text-muted);
            grid-column: 1 / -1;
            text-align: center;
            padding: 20px;
            font-style: italic;
        }
    </style>
</head>
<body>

    <h1>EJ's FNAF STASH</h1>

    <h2>Games</h2>
    <div class="grid-container" id="games-grid">
        <div class="status-msg" id="status">Loading repository games...</div>
    </div>

    <h2>Example</h2>
    <div class="grid-container example-grid">
        <div class="slot" onclick="fetchAndIframe('example1.html')">
            <div class="icon-container">
                <img id="example-img-1" class="game-icon" src="" alt="FNAF 1" onerror="handleImageError(this)">
            </div>
            <div class="slot-title">FNAF 1</div>
        </div>
        
        <div class="slot" onclick="fetchAndIframe('example2.html')">
            <div class="icon-container">
                <img id="example-img-2" class="game-icon" src="" alt="FNAF 2" onerror="handleImageError(this)">
            </div>
            <div class="slot-title">FNAF 2</div>
        </div>
    </div>

    <div class="iframe-container" id="iframeView">
        <iframe id="exampleFrame" class="main-display" src="" title="Example Content" allowfullscreen></iframe>
    </div>

    <script>
        // ==========================================
        //  ⚙️ CONFIGURATION: MATCH YOUR REPO INFO
        // ==========================================
        const GITHUB_USER = "CalcSolver"; 
        const GITHUB_REPO = "EJ-s-FNAF-STASH";
        // ==========================================

        const gamesGrid = document.getElementById('games-grid');
        const statusMsg = document.getElementById('status');

        // Handles broken links or loading failures gracefully
        function handleImageError(image) {
            const container = image.parentElement;
            image.style.display = 'none';
            
            // Check if fallback already exists to avoid duplication
            if (!container.querySelector('.icon-fallback')) {
                const fallback = document.createElement('div');
                fallback.className = 'icon-fallback';
                fallback.innerText = '🐻';
                container.appendChild(fallback);
            }
        }

        // Helper function to read image URL from an icon file
        async function fetchIconUrl(gameTitle, imgElement) {
            try {
                const response = await fetch(`Icons/${gameTitle}.html`);
                if (!response.ok) throw new Error("Icon file missing");
                
                let textUrl = await response.text();
                textUrl = textUrl.trim();
                
                if (textUrl) {
                    imgElement.src = textUrl;
                } else {
                    handleImageError(imgElement);
                }
            } catch (err) {
                handleImageError(imgElement);
            }
        }

        async function loadRepositoryGames() {
            try {
                // Fetch repo structure from GitHub
                const url = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents`;
                const response = await fetch(url);
                if (!response.ok) throw new Error("Could not read directory structure");
                
                const files = await response.json();
                
                // Keep only main directory HTML games
                const gameFiles = files.filter(file => {
                    const name = file.name.toLowerCase();
                    return file.type === "file" && 
                           file.name.endsWith(".html") && 
                           name !== "index.html" && 
                           name !== "example1.html" && 
                           name !== "example2.html";
                });

                if(gameFiles.length === 0) {
                    statusMsg.innerText = "No game files found in the repository root.";
                    return;
                }

                statusMsg.remove();

                // Setup the Movie section static image files on startup
                fetchIconUrl('FNAF1', document.getElementById('example-img-1'));
                fetchIconUrl('FNAF2', document.getElementById('example-img-2'));

                // Loop through and map each discovered game file
                gameFiles.forEach(file => {
                    const fullFilename = file.name; 
                    const gameTitle = fullFilename.replace('.html', ''); 
                    
                    const link = document.createElement('a');
                    link.href = fullFilename;
                    link.className = 'slot-link';

                    // Prepare individual slot DOM element
                    link.innerHTML = `
                        <div class="slot">
                            <div class="icon-container">
                                <img id="img-${gameTitle}" class="game-icon" src="" alt="${gameTitle}" onerror="handleImageError(this)">
                            </div>
                            <div class="slot-title">${gameTitle}</div>
                        </div>
                    `;
                    gamesGrid.appendChild(link);

                    // Fetch the text file contents asynchronously to fill in the true image src link
                    const targetedImg = document.getElementById(`img-${gameTitle}`);
                    fetchIconUrl(gameTitle, targetedImg);
                });

            } catch (error) {
                console.error(error);
                statusMsg.innerText = "Failed to sync with repository workspace.";
            }
        }

        loadRepositoryGames();

        // Main live preview iframer
        async function fetchAndIframe(filePath) {
            const container = document.getElementById('iframeView');
            const iframe = document.getElementById('exampleFrame');
            
            try {
                const response = await fetch(filePath);
                if (!response.ok) throw new Error('File not found');
                let url = await response.text();
                url = url.trim();

                if (url) {
                    iframe.src = url;
                    container.style.display = 'block';
                    container.scrollIntoView({ behavior: 'smooth' });
                }
            } catch (error) {
                console.error("Iframe rendering fault:", error);
            }
        }
    </script>

</body>
</html>
