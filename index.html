<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EJ's FNAF STASH</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: #ff3333;
            font-size: 3rem;
            text-shadow: 0 0 10px rgba(255, 51, 51, 0.7);
            margin-bottom: 30px;
            text-align: center;
        }

        h2 {
            border-bottom: 2px solid #333;
            padding-bottom: 10px;
            width: 100%;
            max-width: 1000px;
            color: #ffaa00;
            margin-top: 40px;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1000px;
        }

        .slot {
            background-color: #1e1e1e;
            border: 2px solid #ff3333;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100px;
        }

        .slot:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(255, 51, 51, 0.6);
            background-color: #252525;
        }

        .example-grid .slot {
            border-color: #00ffcc;
        }

        .example-grid .slot:hover {
            box-shadow: 0 5px 15px rgba(0, 255, 204, 0.6);
        }

        .slot-title {
            font-size: 1.2rem;
            font-weight: bold;
        }

        .slot-link {
            text-decoration: none;
            color: white;
            width: 100%;
            height: 100%;
        }

        .iframe-container {
            width: 100%;
            max-width: 1000px;
            margin-top: 25px;
            display: none;
        }

        iframe {
            width: 100%;
            height: 600px;
            border: 2px solid #333;
            border-radius: 8px;
            background-color: #000;
        }
    </style>
</head>
<body>

    <h1>EJ's FNAF STASH</h1>

    <h2>Games</h2>
    <div class="grid-container" id="games-grid">
        </div>

    <h2>Example</h2>
    <div class="grid-container example-grid">
        <div class="slot" onclick="fetchAndIframe('example1.html')">
            <div class="slot-title">FNAF 1</div>
        </div>
        <div class="slot" onclick="fetchAndIframe('example2.html')">
            <div class="slot-title">FNAF 2</div>
        </div>
    </div>

    <div class="iframe-container" id="iframeView">
        <iframe id="exampleFrame" src="" title="Example Content" allowfullscreen></iframe>
    </div>

    <script>
        // 1. Generate the 11 Game slots pointing to FNAF1.html ... FNAF11.html
        const gamesGrid = document.getElementById('games-grid');
        const totalGames = 11;

        for (let i = 1; i <= totalGames; i++) {
            const link = document.createElement('a');
            link.href = `FNAF${i}.html`;
            link.className = 'slot-link';

            const slot = document.createElement('div');
            slot.className = 'slot';

            const title = document.createElement('div');
            title.className = 'slot-title';
            title.innerText = `FNAF ${i}`;

            slot.appendChild(title);
            link.appendChild(slot);
            gamesGrid.appendChild(link);
        }

        // 2. Reads the text URL from example1.html or example2.html and puts it in the iframe
        async function fetchAndIframe(filePath) {
            const container = document.getElementById('iframeView');
            const iframe = document.getElementById('exampleFrame');
            
            try {
                // Fetch the URL text inside your file
                const response = await fetch(filePath);
                if (!response.ok) throw new Error('File not found');
                
                let url = await response.text();
                url = url.trim(); // Clean up any spaces or line breaks

                if (url) {
                    iframe.src = url;
                    container.style.display = 'block';
                    container.scrollIntoView({ behavior: 'smooth' });
                }
            } catch (error) {
                console.error("Could not load the URL from file:", error);
                alert("Failed to load the website URL from " + filePath);
            }
        }
    </script>

</body>
</html>
