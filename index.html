<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EJ's FNAF STASH</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: #ff3333;
            font-size: 3rem;
            text-shadow: 0 0 10px rgba(255, 51, 51, 0.7);
            margin-bottom: 30px;
            text-align: center;
        }

        h2 {
            border-bottom: 2px solid #333;
            padding-bottom: 10px;
            width: 100%;
            max-width: 1000px;
            color: #ffaa00;
            margin-top: 40px;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1000px;
        }

        .slot {
            background-color: #1e1e1e;
            border: 2px solid #333;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100px;
        }

        .slot:hover {
            transform: translateY(-5px);
            border-color: #ff3333;
            box-shadow: 0 5px 15px rgba(255, 51, 51, 0.4);
        }

        .example-grid .slot:hover {
            border-color: #00ffcc;
            box-shadow: 0 5px 15px rgba(0, 255, 204, 0.4);
        }

        .slot-title {
            font-size: 1.1rem;
            font-weight: bold;
        }

        .slot-link {
            text-decoration: none;
            color: white;
            width: 100%;
            height: 100%;
        }

        .iframe-container {
            width: 100%;
            max-width: 1000px;
            margin-top: 25px;
            display: none; /* Hidden by default until an example slot is clicked */
        }

        iframe {
            width: 100%;
            height: 500px;
            border: 2px solid #333;
            border-radius: 8px;
            background-color: #000;
        }
    </style>
</head>
<body>

    <h1>EJ's FNAF STASH</h1>

    <h2>Games</h2>
    <div class="grid-container">
        <a href="thegame.html" class="slot-link"><div class="slot"><div class="slot-title">Game Slot 1</div></div></a>
        <a href="thegame.html" class="slot-link"><div class="slot"><div class="slot-title">Game Slot 2</div></div></a>
        <a href="thegame.html" class="slot-link"><div class="slot"><div class="slot-title">Game Slot 3</div></div></a>
        <a href="thegame.html" class="slot-link"><div class="slot"><div class="slot-title">Game Slot 4</div></div></a>
        <a href="thegame.html" class="slot-link"><div class="slot"><div class="slot-title">Game Slot 5</div></div></a>
        <a href="thegame.html" class="slot-link"><div class="slot"><div class="slot-title">Game Slot 6</div></div></a>
        <a href="thegame.html" class="slot-link"><div class="slot"><div class="slot-title">Game Slot 7</div></div></a>
        <a href="thegame.html" class="slot-link"><div class="slot"><div class="slot-title">Game Slot 8</div></div></a>
        <a href="thegame.html" class="slot-link"><div class="slot"><div class="slot-title">Game Slot 9</div></div></a>
        
        <a href="game2.html" class="slot-link"><div class="slot" style="border-color: #00aaff;"><div class="slot-title">Separate Game 1</div></div></a>
        <a href="game3.html" class="slot-link"><div class="slot" style="border-color: #00aaff;"><div class="slot-title">Separate Game 2</div></div></a>
    </div>

    <h2>Example</h2>
    <div class="grid-container example-grid">
        <div class="slot" onclick="loadExample('example.html')">
            <div class="slot-title">Example Website 1</div>
        </div>
        <div class="slot" onclick="loadExample('example2.html')">
            <div class="slot-title">Example Website 2</div>
        </div>
    </div>

    <div class="iframe-container" id="iframeView">
        <iframe id="exampleFrame" src="" title="Example Content"></iframe>
    </div>

    <script>
        function loadExample(url) {
            const container = document.getElementById('iframeView');
            const iframe = document.getElementById('exampleFrame');
            
            iframe.src = url;
            container.style.display = 'block'; // Show the iframe container when a slot is clicked
            
            // Scroll down smoothly to the iframe view
            container.scrollIntoView({ behavior: 'smooth' });
        }
    </script>

</body>
</html>
