<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EJ's FNAF STASH</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: #ff3333;
            font-size: 3rem;
            text-shadow: 0 0 10px rgba(255, 51, 51, 0.7);
            margin-bottom: 30px;
            text-align: center;
        }

        h2 {
            border-bottom: 2px solid #333;
            padding-bottom: 10px;
            width: 100%;
            max-width: 1000px;
            color: #ffaa00;
        }

        /* Container for the 9 slots */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1000px;
            margin-bottom: 50px;
        }

        .game-slot {
            background-color: #1e1e1e;
            border: 2px solid #333;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 120px;
        }

        .game-slot:hover {
            transform: translateY(-5px);
            border-color: #ff3333;
            box-shadow: 0 5px 15px rgba(255, 51, 51, 0.4);
        }

        .game-title {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .game-link {
            text-decoration: none;
            color: white;
            width: 100%;
            height: 100%;
        }

        /* Example section with iframe */
        .example-section {
            width: 100%;
            max-width: 1000px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        iframe {
            width: 100%;
            height: 400px;
            border: 2px solid #333;
            border-radius: 8px;
            background-color: #000;
        }
    </style>
</head>
<body>

    <h1>EJ's FNAF STASH</h1>

    <h2>Games</h2>
    <div class="grid-container">
        <a href="thegame.html" class="game-link"><div class="game-slot"><div class="game-title">Main Game (Slot 1)</div></div></a>
        <a href="thegame.html" class="game-link"><div class="game-slot"><div class="game-title">Main Game (Slot 2)</div></div></a>
        <a href="thegame.html" class="game-link"><div class="game-slot"><div class="game-title">Main Game (Slot 3)</div></div></a>
        <a href="thegame.html" class="game-link"><div class="game-slot"><div class="game-title">Main Game (Slot 4)</div></div></a>
        <a href="thegame.html" class="game-link"><div class="game-slot"><div class="game-title">Main Game (Slot 5)</div></div></a>
        <a href="thegame.html" class="game-link"><div class="game-slot"><div class="game-title">Main Game (Slot 6)</div></div></a>
        <a href="thegame.html" class="game-link"><div class="game-slot"><div class="game-title">Main Game (Slot 7)</div></div></a>
        
        <a href="game2.html" class="game-link"><div class="game-slot" style="border-color: #00aaff;"><div class="game-title">Separate Game 1</div></div></a>
        <a href="game3.html" class="game-link"><div class="game-slot" style="border-color: #00aaff;"><div class="game-title">Separate Game 2</div></div></a>
    </div>

    <h2>Example</h2>
    <div class="example-section">
        <iframe src="example.html" title="Example Content"></iframe>
    </div>

</body>
</html>
